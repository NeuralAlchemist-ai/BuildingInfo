name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in pom.xml
      if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
      run: mvn versions:set -DnewVersion=${{ github.run_number }} -DgenerateBackupPoms=false

    - name: Commit updated pom.xml
      if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pom.xml
        git commit -m "chore: set version to ${{ github.run_number }} [skip ci]"
        git push

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (package + javadoc on Linux)
      if: matrix.os == 'ubuntu-latest'
      run: mvn -B package javadoc:jar --file pom.xml

    - name: Build with Maven (package on macOS)
      if: matrix.os == 'macos-latest'
      run: mvn -B package --file pom.xml


    - name: Prepare dock folder and downloadable jars
      if: matrix.os == 'ubuntu-latest'
      run: |
        set -euo pipefail
        rm -rf ./dock || true
        mkdir -p ./dock
        # extract any javadoc jar(s) into repo-root dock folder
        shopt -s nullglob || true
        for f in target/*-javadoc.jar; do
          echo "Unzipping $f"
          unzip -o "$f" -d ./dock
        done
        # create target-downloadable and copy the application jar there
        rm -rf target-downloadable || true
        mkdir -p target-downloadable
        app_jar="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*-javadoc.jar' ! -name '*-sources.jar' | head -n 1)"
        if [ -z "${app_jar}" ]; then
          echo "No application JAR was found in target/" >&2
          ls -la target || true
          exit 1
        fi
        cp -v "${app_jar}" "target-downloadable/app-${{ matrix.os }}.jar"
        # zip dock for release attachment convenience
        (cd ./dock && zip -qr ../dock.zip .)
        # show what will be uploaded
        ls -la target-downloadable || true
        ls -la dock || true

    - name: Prepare downloadable jar on macOS
      if: matrix.os == 'macos-latest'
      run: |
        set -euo pipefail
        rm -rf target-downloadable || true
        mkdir -p target-downloadable
        app_jar="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*-javadoc.jar' ! -name '*-sources.jar' | head -n 1)"
        if [ -z "${app_jar}" ]; then
          echo "No application JAR was found in target/" >&2
          ls -la target || true
          exit 1
        fi
        cp -v "${app_jar}" "target-downloadable/app-${{ matrix.os }}.jar"
        ls -la target-downloadable || true

    - name: Upload Linux build artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-${{ matrix.os }}
        if-no-files-found: error
        path: |
          target-downloadable/*.jar
          dock.zip

    - name: Upload macOS build artifacts
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-${{ matrix.os }}
        if-no-files-found: error
        path: |
          target-downloadable/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
    - name: Download Linux build artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-assets-ubuntu-latest
        path: release-assets/linux

    - name: Download macOS build artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-assets-macos-latest
        path: release-assets/macos

    - name: Assemble release assets
      run: |
        set -euo pipefail
        rm -rf release-assets-final || true
        mkdir -p release-assets-final
        find release-assets/linux -type f -name '*.jar' -exec cp -v {} release-assets-final/ \;
        find release-assets/macos -type f -name '*.jar' -exec cp -v {} release-assets-final/ \;
        find release-assets/linux -type f -name 'dock.zip' -exec cp -v {} release-assets-final/dock.zip \;
        echo "Release assets:"
        ls -la release-assets-final

    - name: Verify both jars exist
      run: |
        set -euo pipefail
        test -f release-assets-final/app-ubuntu-latest.jar
        test -f release-assets-final/app-macos-latest.jar
        test -f release-assets-final/dock.zip

    - name: Unpack dock.zip
      run: |
        rm -rf ./dock || true
        mkdir -p ./dock
        unzip -o release-assets-final/dock.zip -d ./dock

    - name: Deploy Javadoc to gh-pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        publish_dir: ./dock
        publish_branch: gh-pages
        allow_empty_commit: false
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release with artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets-final/app-ubuntu-latest.jar
          release-assets-final/app-macos-latest.jar
          release-assets-final/dock.zip
        tag_name: ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
