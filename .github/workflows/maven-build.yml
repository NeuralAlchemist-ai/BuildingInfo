name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in pom.xml
      if: github.event_name == 'push'
      run: mvn versions:set -DnewVersion=${{ github.run_number }} -DgenerateBackupPoms=false

    - name: Commit updated pom.xml
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pom.xml
        git commit -m "chore: set version to ${{ github.run_number }} [skip ci]"
        git push

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (package + javadoc)
      run: mvn -B package javadoc:jar --file pom.xml


    - name: Prepare dock folder and downloadable jars
      run: |
        set -euo pipefail
        rm -rf ./dock || true
        mkdir -p ./dock
        # extract any javadoc jar(s) into repo-root dock folder
        shopt -s nullglob || true
        for f in target/*-javadoc.jar; do
          echo "Unzipping $f"
          unzip -o "$f" -d ./dock
        done
        # create target-downloadable and copy the application jar there
        rm -rf target-downloadable || true
        mkdir -p target-downloadable
        app_jar="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*-javadoc.jar' ! -name '*-sources.jar' | head -n 1)"
        if [ -z "${app_jar}" ]; then
          echo "No application JAR was found in target/" >&2
          ls -la target || true
          exit 1
        fi
        cp -v "${app_jar}" target-downloadable/app.jar
        # zip dock for release attachment convenience
        (cd ./dock && zip -qr ../dock.zip .)
        # show what will be uploaded
        ls -la target-downloadable || true
        ls -la dock || true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-assets
        path: |
          target-downloadable/app.jar
          dock.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-assets
        path: release-assets

    - name: Unpack dock.zip
      run: |
        rm -rf ./dock || true
        mkdir -p ./dock
        unzip -o release-assets/dock.zip -d ./dock

    - name: Deploy Javadoc to gh-pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        publish_dir: ./dock
        publish_branch: gh-pages
        allow_empty_commit: false
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release with artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets/target-downloadable/app.jar
          release-assets/dock.zip
        tag_name: ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
